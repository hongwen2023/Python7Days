# 复制本文件为 config.yaml，再把路径改成你自己的。

# 收件箱：你把 PDF 报告丢进来的文件夹
inbox_dir: ~/PDF收件箱

# 输出目录：Obsidian 库里的一个子文件夹（库本身就是普通文件夹，直接写进去即可）
vault_dir: ~/Documents/MyVault/PDF解读

# 解读引擎：
#   claude-cli —— 用本机已登录的 Claude Code 命令行（推荐，无需 API key）
#   api        —— 用 Anthropic API（需要设置环境变量 ANTHROPIC_API_KEY）
engine: claude-cli

# 使用的模型
model: claude-sonnet-5

# 送给模型的正文字数上限（超长报告会截取开头 80% + 结尾 20%）
max_chars: 120000
